name: Acer One 8 Halium Cloud Compiler

on:
  workflow_dispatch: # Allows you to start the build manually with a button click!

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Maximize Server Disk Space
      run: |
        echo "=== Disk space before cleanup ==="
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo apt-get clean
        echo "=== Disk space after cleanup ==="
        df -h

    - name: Install Android Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Install Google Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Download Halium 10 Base Code
      run: |
        git config --global user.name "Bhavit-45"
        git config --global user.email "bhavit@example.com"
        mkdir halium && cd halium
        repo init -u https://github.com/Halium/android -b halium-10.0 --depth=1
        repo sync -c -j8 --no-clone-bundle --no-tags

    - name: Inject Custom Acer Configuration
      run: |
        # Create the exact folder structure Halium expects
        mkdir -p halium/device/acer/T482L
        
        if [ -d "T482L" ]; then
          echo "--> Found T482L folder layout. Copying contents..."
          cp -r T482L/* halium/device/acer/T482L/
        else
          echo "--> Files are loose in repository root. Shuffling them into target directory..."
          cp *.mk halium/device/acer/T482L/ 2>/dev/null || true
          cp Android* halium/device/acer/T482L/ 2>/dev/null || true
        fi
        
        echo "=== Verified Injected Device Tree Files ==="
        ls -la halium/device/acer/T482L/

    - name: Run Patcher Engine
      run: |
        cd halium
        hybris-patches/apply-patches.sh --mb || true
        repo forall -c 'git am --abort 2>/dev/null || true'

    - name: Bypass Duplicate e2fsck Modules
      run: |
        cd halium
        python3 -c '
        def fix(p, m):
            try:
                with open(p, "r") as f: c = f.read()
                t = f"name: \"{m}\""
                i = c.find(t)
                if i != -1:
                    j = c.find(t, i + len(t))
                    if j != -1:
                        c = c[:j] + f"name: \"{m}_dup\"" + c[j+len(t):]
                        with open(p, "w") as f: f.write(c)
                        print(f"Successfully bypassed duplicate for {m}!")
            except Exception as e: print(e)
        fix("external/e2fsprogs/e2fsck/Android.bp", "e2fsck_recovery")
        fix("external/e2fsprogs/misc/Android.bp", "tune2fs_recovery")
        '

    - name: Bypass Missing Soong Variables (Copilot Enhanced)
      run: |
        cd halium
        echo "=== Cleaning up unmapped PATH_OVERRIDE_SOONG flags ==="
        find . -name "Android.bp" -type f -exec sed -i 's/\$(PATH_OVERRIDE_SOONG)//g' {} +
        
        echo "=== Applying Copilot Fix: Substituting KERNEL_MAKE_CMD with make ==="
        find . -name "Android.bp" -type f -exec sed -i 's/\$(KERNEL_MAKE_CMD)/make/g' {} +

    - name: Compile System Images
      run: |
        cd halium
        source build/envsetup.sh
        lunch halium_T482L-userdebug
        export USE_HOST_LEX=yes
        mka hybris-boot systemimage

    - name: Upload Finished Boot Image File
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Acer-Boot-Image
        path: halium/out/target/product/T482L/hybris-boot.img

    - name: Upload Finished System Image File
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Acer-System-Image
        path: halium/out/target/product/T482L/system.img
        
