name: Acer One 8 Halium Cloud Compiler

on:
  workflow_dispatch: # Allows you to start the build manually with a button click!

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Maximize Server Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Android Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Google Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Download Halium 10 Base Code
      run: |
        git config --global user.name "Bhavit-45"
        git config --global user.email "bhavit@example.com"
        mkdir halium && cd halium
        repo init -u https://github.com/Halium/android -b halium-10.0 --depth=1
        repo sync -c -j8 --no-clone-bundle --no-tags

    - name: Inject Custom Acer Configuration
      run: |
        mkdir -p halium/device/acer/
        if [ -d "T482L" ]; then
          cp -r T482L halium/device/acer/
        else
          echo "ERROR: T482L folder not found in repository root yet!"
          exit 1
        fi

    - name: Run Patcher Engine
      run: |
        cd halium
        hybris-patches/apply-patches.sh --mb || true
        repo forall -c 'git am --abort 2>/dev/null || true'

    - name: Compile Hybris-Boot Image
      run: |
        cd halium
        source build/envsetup.sh
        lunch halium_T482L-userdebug
        export USE_HOST_LEX=yes
        mka hybris-boot

    - name: Upload Finished Boot Image File
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Acer-Boot-Image
        path: halium/out/target/product/T482L/hybris-boot.img
        
